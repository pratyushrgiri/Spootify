<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- lets link fontausom for icons -->
    <script src="https://kit.fontawesome.com/b361b019b1.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/Spootify/css/style.css">
    <title>Spootify</title>
</head>
<body>
    <!-- Idk the use of header if u find any use to it u can use it and push  -->
    <!-- <header>header</header> -->


    <!-- the nav bar of the spootify -->
    <nav>
        <!-- logo is kept in this section -->
        <div id="logocontainer">
            <a href="#"><i class="fa-brands fa-spotify" id="logo"></i></a>
        </div>
        <div id="homeButtonContainer">
            <a href="#"><i class="fa-solid fa-house" id="homeButton"></i></a>
        </div>
        <!-- searchbar is kept in this section -->
        <div id="searchBar">
            <button><i class="fa-solid fa-magnifying-glass"></i></button>
            <input type="text" placeholder="Search for artists, songs, or podcasts">
            <button>
                <svg class="w-6 h-6 text-gray-800 dark:text-white" id="brouse" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M20 14h-2.722L11 20.278a5.511 5.511 0 0 1-.9.722H20a1 1 0 0 0 1-1v-5a1 1 0 0 0-1-1ZM9 3H4a1 1 0 0 0-1 1v13.5a3.5 3.5 0 1 0 7 0V4a1 1 0 0 0-1-1ZM6.5 18.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2ZM19.132 7.9 15.6 4.368a1 1 0 0 0-1.414 0L12 6.55v9.9l7.132-7.132a1 1 0 0 0 0-1.418Z"/>
</svg>
</button>
        </div>

    </nav>


    <!-- side bar of the spootify -->
    <div id="sideBar" class="contentArea">side bar</div>


    <!-- the playlist sidepanal of spootify -->
    <div id="playlistSection" class="contentArea">playlist</div>


    <!-- main bar of the spootify -->
    <main class="contentArea">main</main>


    <!-- music player of the spootify -->
    <div id="musicPlayer">music player</div>

</body>
</html>
