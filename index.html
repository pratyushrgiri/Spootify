<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- lets link fontausom for icons -->
    <script src="https://kit.fontawesome.com/b361b019b1.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/css/style.css">
    <title>spootiy</title>
</head>
<body>
    <!-- Idk the use of header if u find any use to it u can use it and push  -->
    <!-- <header>header</header> -->


    <!-- the nav bar of the spootify -->
    <nav>
        <!-- logo is kept in this section -->
        <div id="logocontainer">
            <a href="#"><i class="fa-brands fa-spotify" id="logo"></i></a>
        </div>
            <div id="searchContainer">
                <div id="homeButtonContainer">
                <!-- didnt found the orignal icon so put the relivent one -->
                <a href="#"><i class="fa-solid fa-house" id="homeButton"></i></a>
            </div>
                <!-- searchbar is kept in this section -->
            <div id="searchBar" class="searchButtons">
                <!-- magnifing icon button section -->
                <button id="searchButton"><i class="fa-solid fa-magnifying-glass" id="searchIcon"></i></button>
                <!-- search input section -->
                <input type="text" placeholder="Search for artists, songs, or podcasts">
                <!-- brouse button section -->
                <!-- didnt found the icon so putted the relivent one  -->
                <a id="brouseButton" class="searchButtons"><i class="fa-solid fa-list" id="brouse"></i></a>
            </div>
        </div>
        <!-- account section  -->
        <div id="accountContainer">
            <!-- bell icon for notification -->
            <div id="notificationWrapper">
            <a href="#"><i class="fa-solid fa-bell " id="notificationIcon"></i></a>
            </div>
            <!-- user profile icon -->
            <div id="profileWrapper">
            <a href="#"><i class="fa-solid fa-user" id="profileIcon"></i></a>
            </div>
    </nav>


    <!-- side bar of the spootify -->
    <div id="sideBar" class="contentArea">side bar</div>


    <!-- the playlist sidepanal of spootify -->
    <div id="playlistSection" class="contentArea">playlist</div>


    <!-- main bar of the spootify -->
    <main class="contentArea">
        <h2 class="section-title">Title</h2>
        <div class="music-grid">
        <div class="music-card">
                <div class="card-image">
                    <img src="" alt="title">
                    <button class="play-button">
                        <i class="fa-solid fa-play"></i>
                    </button>
                </div>
                <div class="card-content">
                    <h3 class="card-title">title</h3>
                    <p class="card-description"></p>
                </div>
            </div>

        </div>
    </main>
    <!-- music player of the spootify -->
    <div id="musicPlayer">
        <audio id="audio" src="/Resources/Apocalypse - Cigarettes After Sex.mp3"></audio> 
        <div id="playerControlsPause">
            <button id="prevButton"><i class="fa-solid fa-backward"></i></button>
            <button id="playPauseButton"><i class="fa-solid fa-play"></i></button>
            <button id="nextButton"><i class="fa-solid fa-forward"></i></button>
            <div id="progressContainer">
                <span id="currentTime">0:00</span>
                <input type="range" id="progressBar" min="0" max="100" value="0">
                <span id="duration">0:00</span>
            </div>
        </div>

    </div>
<script src="/Js/app.js"></script>
</body>
</html>
